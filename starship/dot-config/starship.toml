add_newline = true
command_timeout = 200
format = '''[$hostname$directory$git_branch$git_status$python]($style)
$character'''

[character]
error_symbol   = "[✗](bold red)"
success_symbol = "[](bold dimmed cyan)"

[directory]
truncation_length = 6 
truncation_symbol = "…/"
format            = "[$path]($style)[$read_only]($read_only_style) "
repo_root_style   = "bold dimmed cyan"
repo_root_format  = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[hostname]
ssh_only = false
format   = '[$hostname]($style) '
style    = "bold red"
disabled = false

[git_branch]
format = "[$branch]($style) "
style  = "italic purple"

[git_status]
format     = '[$all_status]($style)'
style      = "bold purple"
ahead      = "⇡${count} "
diverged   = "⇕⇡${ahead_count}⇣${behind_count} "
behind     = "⇣${count} "
conflicted = " "
up_to_date = " "
untracked  = " "
modified   = " "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""

[python]
format          = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
version_format  = 'v${raw}'
